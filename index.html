<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Quest - Aprenda JavaScript!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; color: #fff; overflow-x: hidden; }
  header { background: rgba(255,255,255,0.05); padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .logo { font-size: 1.8rem; font-weight: 800; color: #f7e017; }
  .xp-bar-container { display: flex; align-items: center; gap: 10px; }
  .xp-label { font-size: 0.85rem; color: #f7e017; font-weight: 700; }
  .xp-bar { width: 180px; height: 12px; background: rgba(255,255,255,0.15); border-radius: 10px; overflow: hidden; }
  .xp-fill { height: 100%; background: linear-gradient(90deg, #f7e017, #f9a825); border-radius: 10px; transition: width 0.5s ease; width: 0%; }
  .xp-text { font-size: 0.8rem; color: #ccc; }
  .nivel { background: #f7e017; color: #000; font-weight: 800; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; }
  .hero { text-align: center; padding: 60px 20px 40px; }
  .hero h1 { font-size: 3rem; font-weight: 900; line-height: 1.2; margin-bottom: 15px; }
  .hero h1 span { color: #f7e017; }
  .hero p { font-size: 1.1rem; color: #bbb; max-width: 500px; margin: 0 auto 30px; line-height: 1.6; }
  .btn-start { background: #f7e017; color: #000; font-weight: 800; font-size: 1.1rem; padding: 15px 40px; border-radius: 50px; border: none; cursor: pointer; }
  .progress-section { max-width: 800px; margin: 0 auto 20px; padding: 0 20px; text-align: center; }
  .progress-section p { font-size: 0.9rem; color: #999; margin-bottom: 8px; }
  .progress-bar-big { height: 16px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
  .progress-fill-big { height: 100%; background: linear-gradient(90deg, #f7e017, #f9a825); border-radius: 10px; transition: width 0.7s ease; width: 0%; }
  .trail-section { padding: 20px 20px 40px; max-width: 800px; margin: 0 auto; }
  .trail-section h2 { text-align: center; font-size: 1.5rem; margin-bottom: 30px; color: #f7e017; }
  .trail { display: flex; flex-direction: column; gap: 15px; }
  .lesson-card { display: flex; align-items: center; gap: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s ease; }
  .lesson-card:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); border-color: rgba(247,224,23,0.5); }
  .lesson-card.locked { opacity: 0.5; cursor: not-allowed; }
  .lesson-card.locked:hover { transform: none; }
  .lesson-card.completed { border-color: rgba(100,255,100,0.4); background: rgba(100,255,100,0.05); }
  .lesson-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; background: rgba(247,224,23,0.15); border: 2px solid rgba(247,224,23,0.4); }
  .lesson-info h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
  .lesson-info p { font-size: 0.85rem; color: #999; }
  .lesson-badge { margin-left: auto; font-size: 0.75rem; padding: 4px 12px; border-radius: 20px; font-weight: 700; flex-shrink: 0; }
  .badge-free { background: rgba(247,224,23,0.2); color: #f7e017; }
  .badge-done { background: rgba(100,255,100,0.2); color: #90ff90; }
  .badge-locked { background: rgba(255,255,255,0.05); color: #666; }
  .achievements-section { padding: 20px 20px 60px; max-width: 800px; margin: 0 auto; }
  .achievements-section h2 { text-align: center; font-size: 1.4rem; color: #f7e017; margin-bottom: 20px; }
  .achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
  .achievement { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 18px 10px; text-align: center; }
  .achievement.unlocked { background: rgba(247,224,23,0.1); border-color: rgba(247,224,23,0.4); }
  .achievement .ach-icon { font-size: 2.2rem; margin-bottom: 8px; filter: grayscale(1); }
  .achievement.unlocked .ach-icon { filter: none; }
  .achievement .ach-name { font-size: 0.8rem; color: #777; }
  .achievement.unlocked .ach-name { color: #f7e017; font-weight: 700; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 15px; }
  .modal-overlay.active { display: flex; }
  .modal { background: #0f2027; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto; padding: 30px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
  .modal-header h2 { font-size: 1.4rem; color: #f7e017; }
  .btn-close { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .tab { padding: 10px 18px; border: none; background: transparent; color: #999; font-size: 0.9rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: #f7e017; border-bottom-color: #f7e017; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .lesson-content p { line-height: 1.7; color: #ccc; margin-bottom: 15px; font-size: 0.95rem; }
  .lesson-content h3 { color: #f7e017; margin: 20px 0 10px; font-size: 1.05rem; }
  .tip-box { background: rgba(247,224,23,0.08); border-left: 3px solid #f7e017; border-radius: 8px; padding: 14px 18px; margin: 15px 0; font-size: 0.9rem; color: #ddd; font-family: monospace; line-height: 1.8; white-space: pre-wrap; }
  .editor-area { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .editor-panel h4, .preview-panel h4 { font-size: 0.85rem; color: #999; margin-bottom: 8px; text-transform: uppercase; }
  .code-editor { width: 100%; height: 240px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #f7e017; font-family: monospace; font-size: 0.85rem; padding: 14px; resize: vertical; outline: none; line-height: 1.6; }
  .console-output { width: 100%; height: 240px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 14px; font-family: monospace; font-size: 0.85rem; overflow-y: auto; color: #90ff90; line-height: 1.8; }
  .console-output .err { color: #ff9090; }
  .console-output .info { color: #90cfff; }
  .btn-run { margin-top: 12px; background: #f7e017; color: #000; font-weight: 800; padding: 10px 28px; border-radius: 30px; border: none; cursor: pointer; font-size: 0.9rem; margin-right: 8px; }
  .btn-clear { margin-top: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #ccc; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; }
  .quiz-question { font-size: 1.05rem; font-weight: 700; margin-bottom: 20px; color: #fff; line-height: 1.5; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .quiz-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 18px; cursor: pointer; font-size: 0.95rem; color: #ccc; text-align: left; width: 100%; }
  .quiz-option:hover:not(:disabled) { border-color: rgba(247,224,23,0.5); background: rgba(247,224,23,0.08); color: #fff; }
  .quiz-option.correct { border-color: rgba(100,255,100,0.7); background: rgba(100,255,100,0.1); color: #90ff90; }
  .quiz-option.wrong { border-color: rgba(255,80,80,0.7); background: rgba(255,80,80,0.1); color: #ff9090; }
  .quiz-feedback { padding: 14px 18px; border-radius: 12px; font-size: 0.95rem; margin-bottom: 15px; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: rgba(100,255,100,0.1); border: 1px solid rgba(100,255,100,0.3); color: #90ff90; }
  .quiz-feedback.err { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff9090; }
  .btn-next-quiz { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 24px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; display: none; }
  .btn-next-quiz.show { display: inline-block; }
  .toast { position: fixed; bottom: 30px; right: 30px; background: #f7e017; color: #000; font-weight: 800; padding: 14px 24px; border-radius: 50px; z-index: 9999; font-size: 0.95rem; transform: translateY(100px); opacity: 0; transition: all 0.4s ease; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  @media (max-width: 600px) { .editor-area { grid-template-columns: 1fr; } .hero h1 { font-size: 2rem; } .xp-bar { width: 100px; } }
</style>
</head>
<body>

<header>
  <div class="logo">JS Quest</div>
  <div class="xp-bar-container">
    <span class="nivel" id="nivelLabel">Nivel 1</span>
    <div>
      <div class="xp-label">XP</div>
      <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
    </div>
    <span class="xp-text" id="xpText">0 / 100</span>
  </div>
</header>

<section class="hero">
  <h1>Aprenda <span>JavaScript</span><br>do jeito certo!</h1>
  <p>A linguagem que faz sites ganharem vida. Aprenda com desafios praticos, quiz e conquistas!</p>
  <button class="btn-start" onclick="scrollToTrail()">Comecar Agora</button>
</section>

<div class="progress-section">
  <p id="progressText">0 de 5 aulas concluidas</p>
  <div class="progress-bar-big"><div class="progress-fill-big" id="progressFill"></div></div>
</div>

<section class="trail-section" id="trilha">
  <h2>Trilha de Aprendizado</h2>
  <div class="trail" id="trailContainer"></div>
</section>

<section class="achievements-section">
  <h2>Conquistas</h2>
  <div class="achievements-grid" id="achievementsGrid"></div>
</section>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Titulo da Aula</h2>
      <button class="btn-close" onclick="closeModal()">X</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('teoria', this)">Teoria</button>
      <button class="tab" onclick="switchTab('pratica', this)">Praticar</button>
      <button class="tab" onclick="switchTab('quiz', this)">Quiz</button>
    </div>
    <div class="tab-content active" id="tab-teoria"></div>
    <div class="tab-content" id="tab-pratica"></div>
    <div class="tab-content" id="tab-quiz"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
